version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: constructionhub-db
    environment:
      POSTGRES_DB: constructionhub
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: constructionhub-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: production
      PORT: "8080"
      DATABASE_URL: jdbc:postgresql://db:5432/constructionhub
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: constructionhub-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
