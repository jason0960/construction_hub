services:
  # Spring Boot API (Docker)
  - type: web
    name: construction-hub-api
    runtime: docker
    rootDir: backend
    plan: starter
    region: oregon
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: construction-hub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY
        sync: false
      - key: R2_SECRET_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: SENDGRID_API_KEY
        sync: false

  # React Frontend (Static Site)
  - type: web
    name: construction-hub-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: construction-hub-db
    plan: basic-1gb
    region: oregon
    postgresMajorVersion: "17"
