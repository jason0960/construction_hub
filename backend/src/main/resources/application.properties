# ============================================
# ConstructionHub API - Application Properties
# ============================================

spring.application.name=construction-hub-api

# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/constructionhub}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits-long!!}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Cloudflare R2 / S3
app.storage.endpoint=${R2_ENDPOINT:}
app.storage.access-key=${R2_ACCESS_KEY:}
app.storage.secret-key=${R2_SECRET_KEY:}
app.storage.bucket=${R2_BUCKET:constructionhub-docs}
app.storage.presigned-url-expiration=3600

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.com.constructionhub=DEBUG
logging.level.org.springframework.security=INFO
