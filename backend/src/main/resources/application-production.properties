# ============================================
# ConstructionHub API - Production Profile
# ============================================

# Graceful shutdown (wait for in-flight requests)
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Strict validation only (Flyway manages schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway — do NOT auto-baseline in production
spring.flyway.baseline-on-migrate=false

# Connection pool tuning
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000

# Request size limits (for document uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Shorter access token in production (15 min)
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Rate limiting: 10 requests per minute per IP on auth endpoints
app.rate-limit.max-requests=10

# Security
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-exception=false

# Logging
logging.level.com.constructionhub=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
